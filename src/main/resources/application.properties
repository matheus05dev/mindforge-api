spring.application.name=Mind Forge

# --- Database Configuration ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/mindforge
spring.datasource.username=mindforge_user
spring.datasource.password=mindforge_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Server Configuration ---
server.port=8080

# --- GitHub OAuth Configuration ---
github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}

# --- Gemini AI Provider Configuration ---
# CORREŪ├O: Alterado de v1beta para v1 para evitar o erro 404 de "model not found"
gemini.api.url.text=https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent
gemini.api.url.multimodal=https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent
gemini.api.key=${GEMINI_API_KEY}
# --- Groq AI Provider Configuration ---
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY}

# --- Resilience4j Configuration (Otimizado para Map-Reduce) ---

# 1. Rate Limiter: Define a cadĻncia de disparos
resilience4j.ratelimiter.instances.aiProvider.limitForPeriod=10
resilience4j.ratelimiter.instances.aiProvider.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.aiProvider.timeoutDuration=15s

# 2. Circuit Breaker: Define quando desistir do Gemini e ir para o Groq
resilience4j.circuitbreaker.instances.aiProvider.slidingWindowSize=10
resilience4j.circuitbreaker.instances.aiProvider.failureRateThreshold=50
resilience4j.circuitbreaker.instances.aiProvider.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.aiProvider.permittedNumberOfCallsInHalfOpenState=3

# --- File Upload Configuration ---
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB